services:

  # ==================================================
  # PostgreSQL + pgvector (app database)
  # ==================================================
  db:
    image: pgvector/pgvector:pg16
    env_file: .env.${APP_ENV:-dev}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - monitoring

  # ==================================================
  # FastAPI Application
  # ==================================================
  app:
    build:
      context: .
      args:
        APP_ENV: ${APP_ENV:-dev}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    env_file:
      - .env.${APP_ENV:-dev}
    environment:
      APP_ENV: ${APP_ENV:-dev}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure
    networks:
      - monitoring

  # ==================================================
  # Eval Cron (Runs evaluation on a schedule)
  # ==================================================
  eval-cron:
    build:
      context: .
      args:
        APP_ENV: ${APP_ENV:-dev}
    command: ["/app/scripts/run-eval.sh"]
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.${APP_ENV:-dev}
    environment:
      APP_ENV: ${APP_ENV:-dev}
      EVAL_INTERVAL: ${EVAL_INTERVAL:-3600}
    restart: unless-stopped
    networks:
      - monitoring

  # ==================================================
  # Prometheus (Metrics Collection)
  # ==================================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring
    restart: always

  # ==================================================
  # Grafana (Metrics Visualization)
  # ==================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - monitoring
    restart: always

  # ==================================================
  # cAdvisor (Container Metrics)
  # ==================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    restart: always

# Networks & Volumes
# ==================================================
networks:
  monitoring:
    driver: bridge

volumes:
  postgres-data:
  grafana-storage: